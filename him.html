<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: scale(1.03);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #4facfe;
            box-shadow: 0 0 5px #4facfe;
            outline: none;
        }

        .gender, .hobbies {
            margin-top: 8px;
        }

        .buttons {
            margin-top: 15px;
            text-align: center;
        }

        input[type="submit"],
        input[type="reset"] {
            padding: 8px 15px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
        }

        input[type="reset"] {
            background-color: #f44336;
            color: white;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        input[type="reset"]:hover {
            background-color: #e53935;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Registration Form</h2>

    <form>
        <!-- Text Box -->
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" placeholder="Enter your email">

        <!-- Drop-down Box -->
        <label>Course</label>
        <select>
            <option>Select Course</option>
            <option>B.Tech</option>
            <option>BCA</option>
            <option>BBA</option>
            <option>B.Com</option>
        </select>

        <!-- Radio Buttons -->
        <label>Gender</label>
        <div class="gender">
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </div>

        <!-- Checkboxes -->
        <label>Hobbies</label>
        <div class="hobbies">
            <input type="checkbox"> Sports
            <input type="checkbox"> Music
            <input type="checkbox"> Reading
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>
    </form>
</div>

</body>
</html>
